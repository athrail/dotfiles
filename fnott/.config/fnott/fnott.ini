# -*- conf -*-

# For documentation on these options, see `man fnott.ini`

# Global values
# output=<undefined>#
# min-width=0
# max-width=0
# max-height=0
# stacking-order=bottom-up
anchor=top-center
# edge-margin-vertical=10
# edge-margin-horizontal=10
# notification-margin=10
icon-theme=Tela-blue-dark
# max-icon-size=32
# selection-helper=dmenu
# selection-helper-uses-null-separator=no
# play-sound=aplay ${filename}

# Default values, may be overridden in 'urgency' specific sections
# layer=top
background=191724e5

border-color=c4a7e7e5
border-radius=5
border-size=2

# padding-vertical=20
# padding-horizontal=20

# dpi-aware=no

title-font=FiraSansCondensed:size=14
title-color=e0def4ff
# title-format=<i>%a%A</i>

summary-font=FiraSansCondensed:size=14
summary-color=e0def4ff
# summary-format=<b>%s</b>\n

body-font=FiraSansCondensed:size=14
body-color=e0def4ff
# body-format=%b

# progress-bar-height=20
# progress-color=ffffffff
# progress-style=bar

# sound-file=
# icon=

# Timeout values are in seconds. 0 to disable
# max-timeout=0
# default-timeout=0
# idle-timeout=0

